syntax = "proto3";

package shachain2pc.daemon.v1;

service ControlService {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc SetConfig(SetConfigRequest) returns (SetConfigResponse);
  rpc EnableChannel(EnableChannelRequest) returns (ChannelResponse);
  rpc DisableChannel(DisableChannelRequest) returns (ChannelResponse);
  rpc Precompute(PrecomputeRequest) returns (PrecomputeResponse);
  rpc Reveal(RevealRequest) returns (RevealResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
}

service PeerService {
  rpc Hello(HelloRequest) returns (HelloResponse);
  rpc Config(ConfigUpdate) returns (ConfigUpdate);
  rpc GetFrontier(GetFrontierRequest) returns (GetFrontierResponse);
  rpc RevealCached(RevealCachedRequest) returns (RevealCachedResponse);
  rpc JobStream(stream JobFrame) returns (stream JobFrame);
}

message StatusRequest {}

message StatusResponse {
  uint32 role = 1;
  string local_addr = 2;
  string peer_addr = 3;
  uint64 max_ram_bytes = 4;
  uint32 workers = 5;
  uint64 precompute = 6;
  uint64 channel_count = 7;
  uint64 active_job_count = 8;
  uint32 effective_workers = 9;
  uint32 ram_limited_workers_raw = 10;
  bool ram_overcommit_warning = 11;
  uint64 baseline_daemon_rss_bytes = 12;
  uint64 current_rss_bytes = 13;
  uint64 idle_session_rss_estimate_bytes = 14;
  uint64 one_h_worker_peak_rss_estimate_bytes = 15;
  uint64 live_session_count = 16;
  uint64 reserved_ram_bytes = 17;
}

message SetConfigRequest {
  optional uint64 max_ram_bytes = 1;
  optional uint32 workers = 2;
  optional uint64 precompute = 3;
}

message SetConfigResponse {
  uint64 max_ram_bytes = 1;
  uint32 workers = 2;
  uint64 precompute = 3;
  uint32 effective_workers = 4;
  bool ram_overcommit_warning = 5;
}

message EnableChannelRequest {
  uint64 channel_index = 1;
  uint64 precompute = 2;
  uint32 ssp_target = 3;
  uint64 delta_lifetime_checked_units_cap = 4;
}

message DisableChannelRequest {
  uint64 channel_index = 1;
}

message ChannelResponse {
  uint64 channel_index = 1;
  bool enabled = 2;
  uint64 precompute = 3;
  uint32 ssp_target = 4;
  uint64 delta_lifetime_checked_units_cap = 5;
  uint64 frontier_nodes = 6;
  uint64 known_secrets = 7;
  uint64 estimated_checked_units = 8;
  uint64 attempted_checked_units = 9;
  uint64 failed_precompute_jobs = 10;
}

message PrecomputeRequest {
  uint64 channel_index = 1;
  uint64 target_index = 2;
}

message PrecomputeResponse {
  uint64 channel_index = 1;
  uint64 target_index = 2;
  uint64 nodes_stored = 3;
  uint64 checked_units = 4;
}

message RevealRequest {
  uint64 channel_index = 1;
  uint64 requested_index = 2;
  uint64 expected_next_index = 3;
  bool allow_seed_reveal = 4;
}

message RevealResponse {
  uint64 channel_index = 1;
  uint64 index = 2;
  string secret_hex = 3;
  bool from_cache = 4;
}

message ListChannelsRequest {}

message ListChannelsResponse {
  repeated ChannelResponse channels = 1;
}

message ListJobsRequest {}

message JobInfo {
  string job_id = 1;
  uint64 channel_index = 2;
  string kind = 3;
  string state = 4;
}

message ListJobsResponse {
  repeated JobInfo jobs = 1;
}

message HelloRequest {
  uint32 role = 1;
  string daemon_id = 2;
  uint32 protocol_version = 3;
}

message HelloResponse {
  uint32 role = 1;
  string daemon_id = 2;
  uint32 protocol_version = 3;
}

message ConfigUpdate {
  uint64 max_ram_bytes = 1;
  uint32 workers = 2;
  uint64 precompute = 3;
  uint32 ssp_target = 4;
  uint64 delta_lifetime_checked_units_cap = 5;
  uint32 effective_workers = 6;
  uint32 ram_limited_workers_raw = 7;
  bool ram_overcommit_warning = 8;
}

message GetFrontierRequest {
  uint64 channel_index = 1;
}

message FrontierNode {
  uint64 mask = 1;
  string public_binding_hex = 2;
}

message GetFrontierResponse {
  repeated FrontierNode nodes = 1;
  bool channel_enabled = 2;
  uint64 precompute = 3;
  uint32 ssp_target = 4;
  uint64 delta_lifetime_checked_units_cap = 5;
  uint32 workers = 6;
  uint32 effective_workers = 7;
  uint32 ram_limited_workers_raw = 8;
  bool ram_overcommit_warning = 9;
}

message RevealCachedRequest {
  uint64 channel_index = 1;
  uint64 requested_index = 2;
  uint64 expected_next_index = 3;
  bool allow_seed_reveal = 4;
  bytes share_bits = 5;
  bytes mac_digest = 6;
  uint32 ssp_target = 7;
  uint64 delta_lifetime_checked_units_cap = 8;
  string public_binding_hex = 9;
}

message RevealCachedResponse {
  bytes share_bits = 1;
  bytes mac_digest = 2;
}

message JobFrame {
  string job_id = 1;
  uint32 channel = 2;
  uint64 channel_index = 3;
  uint64 target_index = 4;
  uint32 ssp = 5;
  bytes digest = 6;
  bool start = 7;
  bytes payload = 8;
  uint32 ssp_target = 9;
  uint64 delta_lifetime_checked_units_cap = 10;
}
